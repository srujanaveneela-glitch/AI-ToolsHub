<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recent tools</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{url_for('static',filename='recent_tool.css')}}">
    
</head>
<body>
    <h1>Recently used Tools</h1>
    <hr>
    <div class="main-container">
        <div class="breadcrumb">
        <a href="{{url_for('home')}}">Home</a>>
        <a href="{{url_for('dashboard')}}">Dashboard</a>>
        <span>Recently used tools</span>
        </div>
        {% if recent %}
        {%for tool in recent %}
        <div class="tool-card">
            <h2>{{tool[0]}}</h2>
            <a href="{{tool[1]}}" target="_blank">Visit Tool</a>
        </div>
        {% endfor %}
        {% else %}
        <p>No recently used tool found.</p>
        {% endif %}
    </div>
</body>
</html>
