<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration page</title>
     <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
     <link rel="stylesheet" href="{{url_for('static',filename='register.css')}}">
     
</head>
<body>
    <h1>Create New Account</h1><br>
     <p>Register to Find Your Best AI Tool</p><br>
     <hr>
     <div class="box">
     <div class="register-container">
        {% if error %}
<p style="color:red; text-align:center;">
    {{ error }}
</p>
{% endif %}
        <form method="post" action="/register"  onsubmit="return validateForm()">
          
                       <section>
                <h3>Basic Details</h3>
            <label for="username">UserName: </label>
            <input type="text" placeholder="enter username" id="username" name="username"><br><br>
             <label for="email">Email: </label>
            <input type="email" placeholder="enter email" id="email" name="email"><br><br>
             <label for="password">Password: </label>
            <input type="password" placeholder="enter password" id="password" name="password"><br><br>
             <label for="Confirm password">confirm Password: </label>
            <input type="password" placeholder="re-enter password" id="confirmpassword" name="confirmpassword"><br><br>
            </section><br>
            
            <button type="submit">Sign up</button>
<p>Already have an account? <a href="{{url_for('login')}}">Login here</a></p>
<p id="message" style="color:red;"></p>

<script>
function validateForm() {
    var email = document.getElementById("email").value;
    var password = document.getElementById("password").value;
    var confirmPassword = document.getElementById("confirmpassword").value;
   
    var emailPattern = /^[a-zA-Z0-9]+@[a-zA-Z]+\.[a-zA-Z]+$/;
    if (!emailPattern.test(email)) {
        document.getElementById("message").innerHTML =
            "Please enter a valid email address";
            document.getElementById("message").style.color = "red";
            document.getElementById("message").style.color = "red";

        return false;
    }

    if (password !== confirmPassword) {
        document.getElementById("message").innerHTML =
            "Password and Confirm Password do not match";
            document.getElementById("message").style.color = "red";

        return false;
    }

    document.getElementById("message").style.color = "green";
    document.getElementById("message").innerHTML =
        "Registration successful";
        return true;
}
</script>

            </form>
     </div>
     </div>
</body>
</html>
